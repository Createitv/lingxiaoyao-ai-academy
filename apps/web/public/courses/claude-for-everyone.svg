<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="white" opacity="0.06"/>
  <circle cx="1050" cy="80" r="120" fill="white" opacity="0.04"/>
  <circle cx="150" cy="550" r="180" fill="white" opacity="0.05"/>
  <circle cx="80" cy="480" r="100" fill="white" opacity="0.03"/>

  <!-- Decorative grid dots -->
  <g fill="white" opacity="0.08">
    <circle cx="900" cy="400" r="3"/>
    <circle cx="930" cy="400" r="3"/>
    <circle cx="960" cy="400" r="3"/>
    <circle cx="990" cy="400" r="3"/>
    <circle cx="1020" cy="400" r="3"/>
    <circle cx="900" cy="430" r="3"/>
    <circle cx="930" cy="430" r="3"/>
    <circle cx="960" cy="430" r="3"/>
    <circle cx="990" cy="430" r="3"/>
    <circle cx="1020" cy="430" r="3"/>
    <circle cx="900" cy="460" r="3"/>
    <circle cx="930" cy="460" r="3"/>
    <circle cx="960" cy="460" r="3"/>
    <circle cx="990" cy="460" r="3"/>
    <circle cx="1020" cy="460" r="3"/>
  </g>

  <!-- Chat bubble icon -->
  <g transform="translate(820, 140)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="160" rx="20" fill="white" opacity="0.15"/>
    <rect x="20" y="30" width="160" height="12" rx="6" fill="white" opacity="0.3"/>
    <rect x="20" y="55" width="200" height="12" rx="6" fill="white" opacity="0.25"/>
    <rect x="20" y="80" width="120" height="12" rx="6" fill="white" opacity="0.2"/>
    <!-- AI response indicator -->
    <circle cx="250" cy="130" r="16" fill="white" opacity="0.2"/>
    <text x="250" y="136" text-anchor="middle" fill="white" font-size="16" opacity="0.6">AI</text>
  </g>

  <!-- Sparkle elements -->
  <g fill="white" opacity="0.5">
    <polygon points="760,100 765,115 780,115 768,124 772,140 760,130 748,140 752,124 740,115 755,115" transform="scale(0.6) translate(500,50)"/>
    <polygon points="760,100 765,115 780,115 768,124 772,140 760,130 748,140 752,124 740,115 755,115" transform="scale(0.4) translate(2200,600)"/>
    <polygon points="760,100 765,115 780,115 768,124 772,140 760,130 748,140 752,124 740,115 755,115" transform="scale(0.3) translate(1800,300)"/>
  </g>

  <!-- Main text -->
  <text x="80" y="260" fill="white" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="700" letter-spacing="1">Claude for Everyone</text>

  <!-- Subtitle -->
  <text x="80" y="330" fill="white" opacity="0.85" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="400">从零开始掌握 AI 助手，无需编程基础</text>

  <!-- Divider -->
  <rect x="80" y="360" width="80" height="4" rx="2" fill="white" opacity="0.5"/>

  <!-- Tags -->
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">
    <rect x="80" y="390" width="100" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="130" y="414" text-anchor="middle" fill="white" opacity="0.9">零基础</text>

    <rect x="200" y="390" width="120" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="260" y="414" text-anchor="middle" fill="white" opacity="0.9">视频课程</text>

    <rect x="340" y="390" width="120" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="400" y="414" text-anchor="middle" fill="white" opacity="0.9">实战练习</text>
  </g>

  <!-- Brand -->
  <text x="80" y="610" fill="white" opacity="0.5" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">lingxiaoyao.cn</text>
</svg>