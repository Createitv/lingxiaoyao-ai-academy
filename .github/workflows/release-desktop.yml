name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 构建时需要的环境变量（静态导出不需要运行时服务端变量）
          NEXT_PUBLIC_SITE_URL: https://lingxiaoyao.cn
          NEXT_PUBLIC_SITE_NAME: 林逍遥AI
          BUILD_TARGET: desktop
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: '林逍遥AI ${{ github.ref_name }}'
          releaseBody: |
            林逍遥AI 桌面客户端 ${{ github.ref_name }}

            ## 下载说明
            - **macOS**: 下载 `.dmg` 文件（Intel + Apple Silicon 通用版）
            - **Windows**: 下载 `.msi` 安装包或 `.exe` 安装程序
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
